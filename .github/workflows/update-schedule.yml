name: Update Hosted Schedule

on:
  push:
    branches:
      - main
    paths:
      - source/schedule.html

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Copy schedule.html to index.html
        run: cp source/schedule.html index.html

      - name: Commit and push updated index.html
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update index.html from source/schedule.html"
          branch: main
          file_pattern: index.html
