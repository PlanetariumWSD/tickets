name: Update Hosted Schedule

on:
  push:
    branches:
      - schedule-source
    paths:
      - schedule.html

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: schedule-source

      - name: Copy schedule.html to index.html
        run: |
          cp schedule.html index.html

      - name: Commit and push to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update index.html from schedule-source"
          branch: main
          file_pattern: index.html
